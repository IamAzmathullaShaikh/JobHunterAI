version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobhunter-ai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AI_PROVIDER=groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}
      - DATABASE_URL=sqlite:////app/data/jobhunter.db
    volumes:
      - jobhunter-data:/app/data
    env_file:
      - .env

volumes:
  jobhunter-data:
